
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pub Booking</title>
    <style>
        body { font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif; padding: 24px; }
        article { max-width: 680px; margin: 0 auto; background:#fff; padding:18px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
        dl { display:grid; grid-template-columns: 160px 1fr; gap:8px 16px; }
        dt { font-weight:600; color:#333 }
        dd { margin:0 }
    </style>
</head>
<body>
    <article>
        <h1 data-testid="title">Pub Booking</h1>
        <p data-testid="venue_name">Haymarket Tap</p>
        <p data-testid="venue_address">12 Dalry Rd, Edinburgh EH11 2BG</p>
        <h2>Event</h2>
        <dl>
            <dt>Date</dt><dd data-testid="date">2026-04-25</dd>
            <dt>Time</dt><dd data-testid="time">19:30</dd>
            <dt>Party size</dt><dd data-testid="party_size">6</dd>
        </dl>
        <h2>Weather</h2>
        <dl>
            <dt>Condition</dt><dd data-testid="condition">cloudy</dd>
            <dt>Temperature</dt><dd data-testid="temperature">12°C</dd>
        </dl>
        <h2>Cost</h2>
        <dl>
            <dt>Total</dt><dd data-testid="total">£556</dd>
            <dt>Deposit</dt><dd data-testid="deposit">£111</dd>
        </dl>
    </article>
</body>
</html>
